<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵喵秘密基地 - 貓咪造咖聯名大廳 🐾</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: '微軟正黑體', sans-serif; background: #dcedc8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .game-window { width: 90%; max-width: 400px; background: white; border: 5px solid #654321; border-radius: 20px; padding: 20px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 2px solid #654321; border-radius: 10px; box-sizing: border-box; }
        .game-btn { background: #ff7096; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 90%; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="game-window" id="auth-section">
    <h1>喵喵秘密基地 🐾</h1>
    <input type="email" id="email" placeholder="請輸入登入信箱">
    <input type="password" id="password" placeholder="請輸入密碼">
    <button class="game-btn" onclick="login()">進入像素大廳</button>
</div>

<script>
    // 嚴格校對過的正確金鑰 (手機已驗證可執行)
    const firebaseConfig = {
        apiKey: "AIzaSyBINtPAtlKlXX1BC5uYIRe7iWFkwrwvnJs",
        authDomain: "moew-14789.firebaseapp.com",
        projectId: "moew-14789",
        storageBucket: "moew-14789.firebasestorage.app",
        messagingSenderId: "849506607849",
        appId: "1:849506607849:web:76980ce61834100f370678",
        databaseURL: "https://moew-14789-default-rtdb.firebaseio.com/"
    };

    // 初始化
    firebase.initializeApp(firebaseConfig);
    
    function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        // 檢查輸入
        if (!email || !password) {
            alert("請輸入完整的帳號密碼喵～");
            return;
        }

        firebase.auth().signInWithEmailAndPassword(email, password)
            .then(() => { 
                alert("登入成功！準備進入造咖大廳..."); 
                window.location.reload(); 
            })
            .catch(error => { 
                console.error("登入錯誤:", error);
                alert("登入失敗: " + error.message); 
            });
    }
</script>
</body>
</html>
