<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵喵專屬秘密大廳 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap" rel="stylesheet">
    
    <!-- 引入相容性高的 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary-color: #ffb3c6;
            --secondary-color: #ffe5ec;
            --dark-color: #4a3e3d;
            --bg-color: #fff0f3;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(255, 179, 198, 0.4);
            padding: 20px;
            border: 4px solid var(--primary-color);
            box-sizing: border-box;
        }

        h1, h2 {
            text-align: center;
            color: #ff7096;
            margin-top: 0;
        }

        .hidden { display: none !important; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        /* 貓咪大廳虛擬空間 */
        .lobby {
            background: #fffaf0;
            border: 2px dashed var(--primary-color);
            border-radius: 16px;
            min-height: 180px;
            position: relative;
            margin: 15px 0;
            overflow: hidden;
        }

        .avatar {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s ease;
        }

        .cat-icon {
            font-size: 28px;
            animation: bounce 0.6s infinite alternate;
        }

        .char-name {
            background: rgba(255, 255, 255, 0.9);
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 11px;
            border: 1px solid var(--primary-color);
            white-space: nowrap;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-4px); }
        }

        .box-title { font-size: 16px; margin-top: 15px; font-weight: bold; color: #ff7096; }
        
        .display-area {
            height: 120px;
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            padding: 10px;
            overflow-y: auto;
            background: #fafafa;
            margin-bottom: 8px;
        }

        .msg { margin-bottom: 6px; font-size: 14px; word-break: break-all; }
        .flex-row { display: flex; gap: 6px; }
        .flex-row input { margin: 0; }
        .flex-row button { width: auto; white-space: nowrap; margin: 0; padding: 0 16px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 登入區塊 -->
    <div id="auth-section">
        <h1>喵喵秘密基地 🐾</h1>
        <p style="text-align: center; color: #999; margin-top: -10px;">限定好友登入系統</p>
        <input type="email" id="email" placeholder="請輸入登入信箱">
        <input type="password" id="password" placeholder="請輸入密碼">
        <button onclick="login()">進入基地</button>
    </div>

    <!-- 遊戲大廳主區塊 -->
    <div id="main-section" class="hidden">
        <h2>貓咪大廳 😺</h2>
        
        <div class="flex-row">
            <select id="char-select" onchange="updateCharacter()">
                <option value="🐱">橘貓 🐱</option>
                <option value="🐈">三花 🐈</option>
                <option value="🦁">奶油獅 🦁</option>
                <option value="🐈‍⬛">黑貓 🐈‍⬛</option>
            </select>
            <button onclick="moveRandomly()">在大廳散步🐾</button>
        </div>

        <!-- 虛擬大廳 -->
        <div class="lobby" id="lobby"></div>

        <!-- 即時聊天室 -->
        <div class="box-title">💬 即時對話</div>
        <div class="display-area" id="chat-area"></div>
        <div class="flex-row">
            <input type="text" id="chat-input" placeholder="對大家喵一聲...">
            <button onclick="sendChat()">傳送</button>
        </div>

        <!-- 永久留言板 -->
        <div class="box-title">📌 貓咪留言板 (下次來還在)</div>
        <div class="display-area" id="board-area"></div>
        <div class="flex-row">
            <input type="text" id="board-input" placeholder="留下一句話給下次來的人...">
            <button onclick="sendBoard()">留言</button>
        </div>
        
        <button onclick="logout()" style="background-color: #ccc; margin-top: 15px; padding: 8px;">離開基地</button>
    </div>
</div>

<script>
    // 這裡已經完美填入你圖片中的專屬金鑰與資料庫網址囉！
    const firebaseConfig = {
        apiKey: "AIzaSyBlNTPAtKlXX1BC5uYIRe7iWFkwrwvnJs",
        authDomain: "moew-14789.firebaseapp.com",
        databaseURL: "https://moew-14789-default-rtdb.firebaseio.com/",
        projectId: "moew-14789",
        storageBucket: "moew-14789.appspot.com",
        messagingSenderId: "849506607849",
        appId: "1:849506607849:web:76980ce61834100f370678"
    };

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;
    let myNickname = "";

    // 監聽登入狀態改變
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            myNickname = user.email.split('@')[0];
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            
            updateCharacter(); 
            listenToFirebase(); 
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }
    });

    // 登入
    function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, password)
            .catch(error => alert("密碼不對或找不到這個貓咪帳號喔！"));
    }

    // 登出
    function logout() {
        if(currentUser) {
            database.ref('lobby/' + currentUser.uid).remove(); 
        }
        auth.signOut();
    }

    // 同步貓咪位置與外觀到雲端
    function updateCharacter() {
        if (!currentUser) return;
        const catIcon = document.getElementById('char-select').value;
        
        const x = Math.floor(Math.random() * 75) + 5;
        const y = Math.floor(Math.random() * 65) + 5;

        database.ref('lobby/' + currentUser.uid).set({
            name: myNickname,
            icon: catIcon,
            x: x,
            y: y
        });
    }

    // 在大廳亂晃
    function moveRandomly() {
        if (!currentUser) return;
        const x = Math.floor(Math.random() * 75) + 5;
        const y = Math.floor(Math.random() * 65) + 5;
        database.ref('lobby/' + currentUser.uid).update({ x: x, y: y });
    }

    // 傳送即時對話
    function sendChat() {
        const text = document.getElementById('chat-input').value;
        if (!text.trim()) return;
        database.ref('chat').push({
            name: myNickname,
            text: text
        });
        document.getElementById('chat-input').value = '';
    }

    // 傳送留言板訊息
    function sendBoard() {
        const text = document.getElementById('board-input').value;
        if (!text.trim()) return;
        database.ref('board').push({
            name: myNickname,
            text: text
        });
        document.getElementById('board-input').value = '';
    }

    // 核心：即時同步雲端資料庫的所有變動
    function listenToFirebase() {
        // 1. 同步大廳上所有人的貓咪角色
        database.ref('lobby').on('value', snapshot => {
            const lobby = document.getElementById('lobby');
            lobby.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(uid => {
                    const player = data[uid];
                    const div = document.createElement('div');
                    div.className = 'avatar';
                    div.style.left = player.x + '%';
                    div.style.top = player.y + '%';
                    div.innerHTML = `<span class="cat-icon">${player.icon}</span><span class="char-name">${player.name}</span>`;
                    lobby.appendChild(div);
                });
            }
        });

        // 2. 同步即時聊天內容（只顯示最新 20 條）
        database.ref('chat').limitToLast(20).on('value', snapshot => {
            const area = document.getElementById('chat-area');
            area.innerHTML = '';
            snapshot.forEach(child => {
                const msg = child.val();
                area.innerHTML += `<div class="msg"><strong>${msg.name}:</strong> ${msg.text}</div>`;
            });
            area.scrollTop = area.scrollHeight; 
        });

        // 3. 同步留言板（永久顯示）
        database.ref('board').on('value', snapshot => {
            const area = document.getElementById('board-area');
            area.innerHTML = '';
            snapshot.forEach(child => {
                const msg = child.val();
                area.innerHTML += `<div class="msg">📌 <strong>${msg.name}:</strong> ${msg.text}</div>`;
            });
            area.scrollTop = area.scrollHeight;
        });
    }
</script>
</body>
</html>
